<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="navbar glass" id="navbar"></header>
  <section style="padding: 100px 0 40px;">
    <div class="container">
      <div class="breadcrumb" style="margin-bottom: 24px;"><a href="storefront.html">Store</a><span class="breadcrumb-separator">/</span><span id="p-cat" style="text-transform: capitalize;">Category</span><span class="breadcrumb-separator">/</span><span id="p-name-breadcrumb">Product</span></div>
      <div class="product-detail-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px;" id="product-detail"></div>
    </div>
  </section>
  <footer class="footer" id="footer"></footer>
  <script src="assets/js/app.js"></script>
  <script>
    UI.injectNavbar(); UI.injectFooter();
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = productId ? DB.getById('products', productId) : null;
    
    if (!product) {
      document.getElementById('product-detail').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px;"><h2>Product not found</h2><a href="storefront.html" class="btn btn-primary" style="margin-top: 16px;">Back to Store</a></div>';
    } else {
      document.getElementById('p-cat').textContent = product.category;
      document.getElementById('p-name-breadcrumb').textContent = product.name;
      document.getElementById('product-detail').innerHTML = `
        <div class="reveal"><div style="background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: var(--radius-xl); overflow: hidden;"><img src="${product.image}" alt="${product.name}" style="width: 100%; aspect-ratio: 1; object-fit: cover;"></div></div>
        <div class="reveal-right">
          <div class="product-category" style="margin-bottom: 8px;">${product.category}</div>
          <h1 style="font-size: var(--text-3xl); font-weight: 700; margin-bottom: 12px;">${product.name}</h1>
          <div class="product-rating" style="margin-bottom: 16px;"><div class="product-rating-stars">${Array(5).fill(0).map((_, i) => `<svg width="16" height="16" viewBox="0 0 24 24" fill="${i < Math.floor(product.rating) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('')}</div><span class="product-rating-count">${product.rating} (${product.review_count} reviews)</span></div>
          <div class="product-price" style="margin-bottom: 20px;"><span class="product-price-current" style="font-size: var(--text-3xl);">$${product.price.toFixed(2)}</span>${product.compare_price ? `<span class="product-price-original" style="font-size: var(--text-lg);">$${product.compare_price.toFixed(2)}</span>` : ''}</div>
          <p style="color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px;">${product.description}</p>
          <div class="stock-indicator" style="margin-bottom: 20px;"><span class="stock-dot ${product.stock === 0 ? 'stock-out' : product.stock <= 10 ? 'stock-low' : 'stock-in'}"></span><span style="font-weight: 500;">${product.stock === 0 ? 'Out of Stock' : product.stock <= 10 ? 'Low Stock - ' + product.stock + ' left' : 'In Stock (' + product.stock + ' available)'}</span></div>
          <div style="display: flex; gap: 12px; margin-bottom: 24px;">
            <div style="display: flex; align-items: center; border: 1px solid var(--border-primary); border-radius: var(--radius-md); overflow: hidden;">
              <button class="qty-btn" onclick="const v=document.getElementById('pqty');if(v.value>1)v.value--;">-</button>
              <input type="number" id="pqty" value="1" min="1" max="${product.stock}" style="width: 48px; text-align: center; border: none; outline: none; font-size: 14px; font-weight: 500; -moz-appearance: textfield;">
              <button class="qty-btn" onclick="const v=document.getElementById('pqty');if(v.value<${product.stock})v.value++;">+</button>
            </div>
            <button class="btn btn-primary btn-lg" style="flex: 1; justify-content: center;" onclick="addToCart('${product.id}')" ${product.stock === 0 ? 'disabled' : ''}>${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}</button>
          </div>
          <div style="display: flex; gap: 12px;"><button class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="Toast.show('Added to wishlist', 'success')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Add to Wishlist</button></div>
        </div>`;
    }
    function addToCart(id) { const p = DB.getById('products', id); const qty = parseInt(document.getElementById('pqty').value) || 1; if (p) { for (let i = 0; i < qty; i++) Cart.addItem(p); } }
  </script>
</body>
</html>
