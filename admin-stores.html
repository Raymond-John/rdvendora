<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stores - Vendora Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Stores</h1><p class="dashboard-subtitle">Manage all stores on the platform.</p></div></div></div>
      <div class="table-container reveal"><table class="data-table"><thead><tr><th>Store</th><th>Owner</th><th>Theme</th><th>Status</th><th>Revenue</th><th>Products</th><th>Actions</th></tr></thead><tbody id="stores-body"></tbody></table></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    if (!Auth.isAdmin()) window.location.href = 'dashboard.html';
    UI.injectSidebar('admin-stores'); UI.injectTopbar();
    const stores = DB.getAll('stores');
    document.getElementById('stores-body').innerHTML = stores.map(s => {
      const owner = DB.getById('users', s.owner_id);
      return `<tr><td><div style="display: flex; align-items: center; gap: 10px;"><div style="width: 36px; height: 36px; background: var(--gradient-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">${s.name.charAt(0)}</div><div><div style="font-weight: 500;">${s.name}</div><div style="font-size: 12px; color: var(--text-muted);">${s.subdomain}.vendora.com</div></div></div></td><td>${owner ? owner.name : 'Unknown'}</td><td style="text-transform: capitalize;">${s.theme}</td><td><span class="badge ${s.status === 'active' ? 'badge-success' : 'badge-error'}">${s.status}</span></td><td style="font-weight: 600;">$${s.analytics.total_revenue.toLocaleString()}</td><td>${s.analytics.total_products}</td><td><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="viewStore('${s.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></td></tr>`;
    }).join('');
    function viewStore(id) { const s = DB.getById('stores', id); if (!s) return; Modal.open(`<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div><div style="font-size: 11px; color: var(--text-muted);">Name</div><div style="font-weight: 600;">${s.name}</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Subdomain</div><div>${s.subdomain}.vendora.com</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Status</div><div>${s.status}</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Products</div><div>${s.analytics.total_products}</div></div></div>`, { title: 'Store Details', width: '400px' }); }
  </script>
</body>
</html>
