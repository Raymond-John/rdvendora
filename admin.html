<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Admin Overview</h1><p class="dashboard-subtitle">Platform-wide analytics and management.</p></div></div></div>
      <div class="stats-grid stagger-children">
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></div><div class="stat-value">3</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div><div class="stat-value">2</div><div class="stat-label">Active Stores</div></div>
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div></div><div class="stat-value">$173k</div><div class="stat-label">Platform Revenue</div></div>
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div></div><div class="stat-value">15</div><div class="stat-label">Total Orders</div></div>
      </div>
      <div class="dashboard-grid dashboard-grid-2">
        <div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">Platform Revenue</h3></div><div class="chart-wrapper"><canvas id="adminRevChart"></canvas></div></div>
        <div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">User Growth</h3></div><div class="chart-wrapper"><canvas id="adminUserChart"></canvas></div></div>
      </div>
      <div class="dashboard-card reveal"><div class="dashboard-card-header"><h3 class="dashboard-card-title">Recent Activity</h3></div><div class="dashboard-card-body"><div class="activity-list" id="admin-activity"></div></div></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    if (!Auth.isAdmin()) { window.location.href = 'dashboard.html'; }
    UI.injectSidebar('admin'); UI.injectTopbar();
    new Chart(document.getElementById('adminRevChart').getContext('2d'), { type: 'line', data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets: [{ label: 'Revenue', data: [42000,48000,51000,49000,56000,62000,58000,64000,68000,72000,78000,85000], borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,0.08)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } }, y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 }, callback: v => '$' + v/1000 + 'k' } } } } });
    new Chart(document.getElementById('adminUserChart').getContext('2d'), { type: 'bar', data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets: [{ label: 'New Users', data: [120,180,240,320,410,500,620,780,950,1200,1500,1900], backgroundColor: '#10b981', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } }, y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 } } } } } });
    document.getElementById('admin-activity').innerHTML = DB.getAll('activity_log').slice(0, 8).map(a => `<div class="activity-item"><div class="activity-icon" style="background: var(--primary-light); color: var(--primary);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></div><div class="activity-content"><div class="activity-text"><strong>${a.action}</strong> - ${a.details}</div><div class="activity-time">${UI.timeAgo(a.created_at)}</div></div></div>`).join('');
  </script>
</body>
</html>
