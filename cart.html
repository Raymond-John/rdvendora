<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="navbar glass" id="navbar"></header>
  <section style="padding: 120px 0 60px;">
    <div class="container" style="max-width: 960px;">
      <h1 style="font-size: var(--text-3xl); font-weight: 700; margin-bottom: 8px;">Shopping Cart</h1>
      <p style="color: var(--text-secondary); margin-bottom: 32px;">Review your items before checkout.</p>
      <div id="cart-content"></div>
    </div>
  </section>
  <footer class="footer" id="footer"></footer>
  <script src="assets/js/app.js"></script>
  <script>
    UI.injectNavbar(); UI.injectFooter();
    function renderCart() {
      const cart = Cart.getItems();
      const items = cart.items || [];
      const container = document.getElementById('cart-content');
      if (!items.length) {
        container.innerHTML = '<div class="empty-state" style="padding: 60px;"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><h4 class="empty-title">Your cart is empty</h4><p class="empty-text">Browse our store and add some products.</p><a href="storefront.html" class="btn btn-primary" style="margin-top: 16px;">Continue Shopping</a></div>';
        return;
      }
      const subtotal = Cart.getTotal();
      const shipping = subtotal > 50 ? 0 : 5.99;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;
      container.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 320px; gap: 32px;">
          <div>
            <div style="display: flex; flex-direction: column; gap: 16px;">
              ${items.map(item => `
                <div class="card" style="padding: 20px;">
                  <div style="display: flex; gap: 16px; align-items: center;">
                    <img src="${item.image}" style="width: 80px; height: 80px; border-radius: 10px; object-fit: cover;" alt="${item.name}">
                    <div style="flex: 1;">
                      <div style="font-weight: 600; margin-bottom: 4px;">${item.name}</div>
                      <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px;">$${item.price.toFixed(2)} each</div>
                      <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="display: flex; align-items: center; border: 1px solid var(--border-primary); border-radius: 6px; overflow: hidden;">
                          <button class="qty-btn" onclick="Cart.updateQty('${item.product_id}', ${item.qty - 1}); renderCart();">-</button>
                          <span style="padding: 0 12px; font-size: 14px; font-weight: 500;">${item.qty}</span>
                          <button class="qty-btn" onclick="Cart.updateQty('${item.product_id}', ${item.qty + 1}); renderCart();">+</button>
                        </div>
                        <button class="btn btn-ghost btn-icon btn-icon-sm" style="color: var(--error);" onclick="Cart.removeItem('${item.product_id}'); renderCart();">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                      </div>
                    </div>
                    <div style="font-weight: 700; font-size: 16px;">$${(item.price * item.qty).toFixed(2)}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
          <div>
            <div class="card" style="padding: 24px; position: sticky; top: 90px;">
              <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Order Summary</h3>
              <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between; font-size: 14px;"><span style="color: var(--text-secondary);">Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
                <div style="display: flex; justify-content: space-between; font-size: 14px;"><span style="color: var(--text-secondary);">Shipping</span><span>${shipping === 0 ? '<span style="color: var(--success);">Free</span>' : '$' + shipping.toFixed(2)}</span></div>
                <div style="display: flex; justify-content: space-between; font-size: 14px;"><span style="color: var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
              </div>
              <div class="divider" style="margin: 12px 0;"></div>
              <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 20px;"><span>Total</span><span>$${total.toFixed(2)}</span></div>
              <a href="checkout.html" class="btn btn-primary w-full" style="justify-content: center; margin-bottom: 8px;">Proceed to Checkout</a>
              <a href="storefront.html" class="btn btn-ghost w-full" style="justify-content: center; font-size: 13px;">Continue Shopping</a>
              ${subtotal < 50 ? `<div style="margin-top: 12px; font-size: 12px; color: var(--text-muted); text-align: center;">Add $${(50 - subtotal).toFixed(2)} more for free shipping!</div>` : ''}
            </div>
          </div>
        </div>`;
    }
    renderCart();
  </script>
</body>
</html>
