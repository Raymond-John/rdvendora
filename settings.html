<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Settings</h1><p class="dashboard-subtitle">Manage your store preferences.</p></div></div></div>
      <div class="settings-section">
        <div class="settings-group reveal">
          <div class="settings-group-header"><div class="settings-group-title">Store Information</div><div class="settings-group-desc">Basic details about your store.</div></div>
          <div class="settings-group-body">
            <div class="form-group"><label class="form-label">Store Name</label><input type="text" class="form-input" id="s-name" value="Lumina Boutique"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="s-desc" rows="2">Curated fashion and lifestyle products.</textarea></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group"><label class="form-label">Currency</label><select class="form-input" id="s-currency"><option>USD</option><option>EUR</option><option>GBP</option><option>CAD</option></select></div>
              <div class="form-group"><label class="form-label">Language</label><select class="form-input" id="s-lang"><option>English</option><option>Spanish</option><option>French</option><option>German</option></select></div>
            </div>
            <button class="btn btn-primary" onclick="saveStoreSettings()">Save Changes</button>
          </div>
        </div>
        <div class="settings-group reveal">
          <div class="settings-group-header"><div class="settings-group-title">Appearance</div><div class="settings-group-desc">Customize how your store looks.</div></div>
          <div class="settings-group-body">
            <div class="form-group"><label class="form-label">Brand Color</label><div class="color-picker-grid"><div class="color-option active" style="background: #4f46e5;" onclick="selectColor(this)"></div><div class="color-option" style="background: #10b981;" onclick="selectColor(this)"></div><div class="color-option" style="background: #f59e0b;" onclick="selectColor(this)"></div><div class="color-option" style="background: #ef4444;" onclick="selectColor(this)"></div><div class="color-option" style="background: #8b5cf6;" onclick="selectColor(this)"></div><div class="color-option" style="background: #ec4899;" onclick="selectColor(this)"></div><div class="color-option" style="background: #06b6d4;" onclick="selectColor(this)"></div><div class="color-option" style="background: #1a1d23;" onclick="selectColor(this)"></div></div></div>
            <div class="form-group"><label class="form-label">Theme</label><select class="form-input" id="s-theme"><option value="minimal">Minimal</option><option value="bold">Bold</option><option value="warm">Warm</option></select></div>
          </div>
        </div>
        <div class="settings-group reveal">
          <div class="settings-group-header"><div class="settings-group-title">Account</div><div class="settings-group-desc">Manage your account settings.</div></div>
          <div class="settings-group-body">
            <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="u-name" value="Sarah Chen"></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="u-email" value="sarah@luminaboutique.com"></div>
            <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-input" placeholder="Enter to change password"></div>
            <div style="display: flex; gap: 8px;"><button class="btn btn-primary" onclick="saveAccountSettings()">Save Changes</button><button class="btn btn-danger" onclick="if(confirm('Delete your account? This cannot be undone.')) Toast.show('Account deletion request submitted', 'info')">Delete Account</button></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('settings'); UI.injectTopbar();
    function selectColor(el) { document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active')); el.classList.add('active'); Toast.show('Color updated', 'success'); }
    function saveStoreSettings() { Toast.show('Store settings saved', 'success'); }
    function saveAccountSettings() { Toast.show('Account settings saved', 'success'); }
  </script>
</body>
</html>
