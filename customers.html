<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Customers</h1><p class="dashboard-subtitle">View and manage your customers.</p></div></div></div>
      <div class="filters-bar reveal"><div class="filters-left"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="cust-search" placeholder="Search customers..." oninput="filterCustomers()"></div></div></div>
      <div class="table-container reveal"><table class="data-table" id="customers-table"><thead><tr><th>Customer</th><th>Email</th><th>Orders</th><th>Total Spent</th><th>Last Order</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('customers'); UI.injectTopbar();
    let allCustomers = DB.getAll('customers');
    function renderCustomers(customers) {
      const tbody = document.querySelector('#customers-table tbody');
      if (!customers.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h4 class="empty-title">No customers found</h4></div></td></tr>'; return; }
      tbody.innerHTML = customers.map(c => `<tr><td><div style="display: flex; align-items: center; gap: 10px;"><div class="avatar avatar-sm" style="background: var(--primary-light); color: var(--primary);">${c.name.split(' ').map(n => n[0]).join('')}</div><span style="font-weight: 500;">${c.name}</span></div></td><td style="color: var(--text-secondary);">${c.email}</td><td>${c.orders_count}</td><td style="font-weight: 600;">$${c.total_spent.toFixed(2)}</td><td style="color: var(--text-muted);">${c.last_order}</td><td><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="viewCustomer('${c.id}')" title="View"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></td></tr>`).join('');
    }
    function filterCustomers() { const q = document.getElementById('cust-search').value.toLowerCase(); renderCustomers(allCustomers.filter(c => !q || c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))); }
    function viewCustomer(id) { const c = DB.getById('customers', id); if (!c) return; Modal.open(`<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;"><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Name</div><div style="font-weight: 600;">${c.name}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Email</div><div>${c.email}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Phone</div><div>${c.phone || 'N/A'}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Member Since</div><div>${new Date(c.created_at).toLocaleDateString()}</div></div></div><div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;"><div style="text-align: center; padding: 12px; background: var(--bg-tertiary); border-radius: 10px;"><div style="font-size: 20px; font-weight: 700;">${c.orders_count}</div><div style="font-size: 11px; color: var(--text-muted);">Orders</div></div><div style="text-align: center; padding: 12px; background: var(--bg-tertiary); border-radius: 10px;"><div style="font-size: 20px; font-weight: 700;">$${c.total_spent.toFixed(0)}</div><div style="font-size: 11px; color: var(--text-muted);">Total Spent</div></div><div style="text-align: center; padding: 12px; background: var(--bg-tertiary); border-radius: 10px;"><div style="font-size: 20px; font-weight: 700;">${c.last_order}</div><div style="font-size: 11px; color: var(--text-muted);">Last Order</div></div></div>`, { title: 'Customer Details', width: '480px' }); }
    renderCustomers(allCustomers);
  </script>
</body>
</html>
