<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Billing</h1><p class="dashboard-subtitle">Manage your subscription and invoices.</p></div></div></div>
      <div class="dashboard-grid">
        <div class="dashboard-card reveal">
          <div class="dashboard-card-header"><h3 class="dashboard-card-title">Current Plan</h3><a href="pricing.html" class="btn btn-primary btn-sm" target="_blank">Upgrade</a></div>
          <div class="dashboard-card-body">
            <div style="margin-bottom: 20px;"><div style="font-size: 24px; font-weight: 700;">Growth</div><div style="font-size: 14px; color: var(--text-secondary);">$49/month, billed monthly</div><div style="margin-top: 8px;"><span class="badge badge-success">Active</span></div></div>
            <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Next billing date: <strong>Jan 15, 2025</strong></div>
            <div class="progress-bar" style="margin-bottom: 8px;"><div class="progress-bar-fill" style="width: 75%;"></div></div>
            <div style="font-size: 12px; color: var(--text-muted);">75% of usage limit (750/1000 orders)</div>
          </div>
        </div>
        <div class="dashboard-card reveal">
          <div class="dashboard-card-header"><h3 class="dashboard-card-title">Payment Method</h3><button class="btn btn-ghost btn-sm" onclick="Toast.show('Update coming soon', 'info')">Update</button></div>
          <div class="dashboard-card-body">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div style="width: 48px; height: 32px; background: var(--bg-tertiary); border-radius: 6px; display: flex; align-items: center; justify-content: center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
              <div><div style="font-weight: 500;">Visa ending in 4242</div><div style="font-size: 12px; color: var(--text-muted);">Expires 12/26</div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="card reveal" style="margin-top: 24px;">
        <div class="card-header"><h3 style="font-size: 16px; font-weight: 600;">Billing History</h3></div>
        <div class="card-body" id="billing-list"></div>
      </div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('billing'); UI.injectTopbar();
    const session = Auth.getSession();
    const bills = DB.query('billing_history', b => b.user_id === session.userId);
    document.getElementById('billing-list').innerHTML = bills.map(b => `<div class="invoice-row"><div class="invoice-info"><div class="invoice-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="invoice-details"><h4>${b.description}</h4><p>${b.invoice} &middot; ${b.date}</p></div></div><div style="display: flex; align-items: center; gap: 12px;"><span class="invoice-amount">$${b.amount.toFixed(2)}</span><span class="badge badge-success">${b.status}</span></div></div>`).join('');
  </script>
</body>
</html>
