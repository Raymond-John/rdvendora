<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-visual">
      <div class="auth-visual-bg"></div>
      <div class="auth-visual-content">
        <a href="index.html" class="auth-visual-brand">
          <div class="auth-visual-brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
          Vendora
        </a>
      </div>
      <div class="auth-visual-body">
        <h2 class="auth-visual-title">Reset your password</h2>
        <p class="auth-visual-text">Enter your email and we'll send you instructions to reset your password.</p>
      </div>
      <div class="auth-visual-footer"><span> 2024 Vendora</span></div>
    </div>
    <div class="auth-form-side">
      <div class="auth-form-container anim-fade-in-up">
        <div class="auth-form-header">
          <h1 class="auth-form-title">Forgot password?</h1>
          <p class="auth-form-subtitle">No worries, we'll send you reset instructions.</p>
        </div>
        <form id="forgot-form" onsubmit="handleForgot(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="forgot-email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary w-full" style="justify-content: center;" id="forgot-btn">Send Reset Link</button>
        </form>
        <div class="auth-footer"><a href="login.html" style="display: flex; align-items: center; gap: 6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to log in</a></div>
      </div>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('forgot-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      setTimeout(() => {
        Toast.show('Reset instructions sent to your email', 'success');
        btn.textContent = 'Email Sent';
      }, 1000);
    }
  </script>
</body>
</html>
