<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Inventory</h1><p class="dashboard-subtitle">Track and manage stock levels.</p></div></div></div>
      <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div></div><div class="stat-value" id="total-stock">0</div><div class="stat-label">Total Stock</div></div>
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div></div><div class="stat-value" id="low-stock">0</div><div class="stat-label">Low Stock</div></div>
        <div class="stat-card reveal"><div class="stat-header"><div class="stat-icon red"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div></div><div class="stat-value" id="out-stock">0</div><div class="stat-label">Out of Stock</div></div>
      </div>
      <div class="table-container reveal"><table class="data-table"><thead><tr><th>Product</th><th>SKU</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead><tbody id="inv-body"></tbody></table></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('inventory'); UI.injectTopbar();
    const products = DB.getAll('products');
    let totalStock = 0, lowStock = 0, outStock = 0;
    document.getElementById('inv-body').innerHTML = products.map(p => {
      totalStock += p.stock;
      if (p.stock === 0) outStock++;
      else if (p.stock <= 10) lowStock++;
      return `<tr><td><div style="display: flex; align-items: center; gap: 10px;"><img src="${p.image}" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover;"><span style="font-weight: 500;">${p.name}</span></div></td><td style="font-family: var(--font-mono); font-size: 12px;">${p.sku}</td><td style="font-weight: 600;">${p.stock}</td><td><span class="stock-indicator"><span class="stock-dot ${p.stock === 0 ? 'stock-out' : p.stock <= 10 ? 'stock-low' : 'stock-in'}"></span>${p.stock === 0 ? 'Out' : p.stock <= 10 ? 'Low' : 'In Stock'}</span></td><td><button class="btn btn-ghost btn-sm" onclick="updateStock('${p.id}', ${p.stock})">Update</button></td></tr>`;
    }).join('');
    document.getElementById('total-stock').textContent = totalStock;
    document.getElementById('low-stock').textContent = lowStock;
    document.getElementById('out-stock').textContent = outStock;
    function updateStock(id, current) { const newStock = prompt('Enter new stock quantity:', current); if (newStock !== null && !isNaN(newStock)) { DB.update('products', id, { stock: parseInt(newStock) }); Toast.show('Stock updated', 'success'); location.reload(); } }
  </script>
</body>
</html>
