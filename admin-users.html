<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Vendora Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Users</h1><p class="dashboard-subtitle">Manage platform users.</p></div></div></div>
      <div class="filters-bar reveal"><div class="filters-left"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="user-search" placeholder="Search users..." oninput="filterUsers()"></div></div></div>
      <div class="table-container reveal"><table class="data-table"><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Store</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="users-body"></tbody></table></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    if (!Auth.isAdmin()) window.location.href = 'dashboard.html';
    UI.injectSidebar('admin-users'); UI.injectTopbar();
    let allUsers = DB.getAll('users');
    function renderUsers(users) {
      document.getElementById('users-body').innerHTML = users.map(u => `<tr><td><div style="display: flex; align-items: center; gap: 10px;"><div class="avatar avatar-sm" style="background: var(--primary-light); color: var(--primary);">${u.initials}</div><span style="font-weight: 500;">${u.name}</span></div></td><td style="color: var(--text-secondary);">${u.email}</td><td><span class="badge ${u.role === 'admin' ? 'badge-error' : 'badge-info'}">${u.role}</span></td><td><span class="badge ${u.status === 'active' ? 'badge-success' : 'badge-error'}">${u.status}</span></td><td>${u.store_id || '-'}</td><td style="color: var(--text-muted);">${new Date(u.created_at).toLocaleDateString()}</td><td><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="viewUser('${u.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></td></tr>`).join('');
    }
    function filterUsers() { const q = document.getElementById('user-search').value.toLowerCase(); renderUsers(allUsers.filter(u => !q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))); }
    function viewUser(id) { const u = DB.getById('users', id); if (!u) return; Modal.open(`<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div><div style="font-size: 11px; color: var(--text-muted);">Name</div><div style="font-weight: 600;">${u.name}</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Email</div><div>${u.email}</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Role</div><div>${u.role}</div></div><div><div style="font-size: 11px; color: var(--text-muted);">Status</div><div>${u.status}</div></div></div>`, { title: 'User Details', width: '400px' }); }
    renderUsers(allUsers);
  </script>
</body>
</html>
