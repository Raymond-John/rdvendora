<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Boutique - Vendora Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="navbar glass" id="navbar"></header>

  <section class="store-hero" style="padding: 120px 0 60px; background: var(--gradient-mesh); text-align: center;">
    <div class="container">
      <div class="hero-badge" style="margin: 0 auto 16px;">Lumina Boutique</div>
      <h1 style="font-size: var(--text-4xl); font-weight: 700; margin-bottom: 12px;">Curated fashion & lifestyle</h1>
      <p style="font-size: var(--text-lg); color: var(--text-secondary); max-width: 500px; margin: 0 auto 24px;">Discover our handpicked collection of premium products for the modern individual.</p>
    </div>
  </section>

  <section style="padding: 40px 0;">
    <div class="container">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
        <div class="tabs"><button class="tab-btn active" onclick="filterCategory(this, '')">All</button><button class="tab-btn" onclick="filterCategory(this, 'fashion')">Fashion</button><button class="tab-btn" onclick="filterCategory(this, 'accessories')">Accessories</button><button class="tab-btn" onclick="filterCategory(this, 'home')">Home</button><button class="tab-btn" onclick="filterCategory(this, 'beauty')">Beauty</button><button class="tab-btn" onclick="filterCategory(this, 'electronics')">Electronics</button></div>
        <div class="search-box" style="width: 240px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="store-search" placeholder="Search products..." oninput="searchStore()"></div>
      </div>
      <div class="product-grid" id="store-products" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;"></div>
    </div>
  </section>

  <footer class="footer" id="footer"></footer>
  <script src="assets/js/app.js"></script>
  <script>
    UI.injectNavbar();
    UI.injectFooter();
    let currentCat = '';
    let allStoreProducts = DB.getAll('products').filter(p => p.status === 'active');

    function renderStoreProducts(products) {
      const grid = document.getElementById('store-products');
      if (!products.length) { grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px;"><p style="color: var(--text-muted);">No products found</p></div>'; return; }
      grid.innerHTML = products.map(p => `<div class="product-card reveal"><div class="product-image"><img src="${p.image}" alt="${p.name}" loading="lazy"><button class="product-wishlist" onclick="toggleWishlist(this, '${p.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button></div><div class="product-info"><div class="product-category">${p.category}</div><a href="product-details.html?id=${p.id}" class="product-name">${p.name}</a><div class="product-rating"><div class="product-rating-stars">${Array(5).fill(0).map((_, i) => `<svg width="12" height="12" viewBox="0 0 24 24" fill="${i < Math.floor(p.rating) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('')}</div><span class="product-rating-count">(${p.review_count})</span></div><div class="product-price"><span class="product-price-current">$${p.price.toFixed(2)}</span>${p.compare_price ? `<span class="product-price-original">$${p.compare_price.toFixed(2)}</span>` : ''}</div><button class="btn btn-primary w-full" style="margin-top: 12px; justify-content: center;" onclick="addToCart('${p.id}')">Add to Cart</button></div></div>`).join('');
    }

    function filterCategory(btn, cat) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = cat;
      applyFilters();
    }

    function searchStore() { applyFilters(); }

    function applyFilters() {
      const q = document.getElementById('store-search').value.toLowerCase();
      renderStoreProducts(allStoreProducts.filter(p => (!currentCat || p.category === currentCat) && (!q || p.name.toLowerCase().includes(q))));
    }

    function addToCart(id) {
      const p = DB.getById('products', id);
      if (p) Cart.addItem(p);
    }

    function toggleWishlist(btn, id) {
      btn.classList.toggle('active');
      Toast.show(btn.classList.contains('active') ? 'Added to wishlist' : 'Removed from wishlist', 'success');
    }

    renderStoreProducts(allStoreProducts);
  </script>
</body>
</html>
