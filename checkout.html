<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="navbar glass" id="navbar"></header>
  <section style="padding: 120px 0 60px;">
    <div class="container" style="max-width: 960px;">
      <div class="breadcrumb" style="margin-bottom: 24px;"><a href="storefront.html">Store</a><span class="breadcrumb-separator">/</span><a href="cart.html">Cart</a><span class="breadcrumb-separator">/</span><span>Checkout</span></div>
      <h1 style="font-size: var(--text-3xl); font-weight: 700; margin-bottom: 32px;">Checkout</h1>
      <div style="display: grid; grid-template-columns: 1fr 320px; gap: 32px;">
        <div>
          <div class="stepper" style="margin-bottom: 32px;">
            <div class="step active" id="step-1"><div class="step-circle">1</div><span class="step-label">Shipping</span></div>
            <div class="step-connector"></div>
            <div class="step" id="step-2"><div class="step-circle">2</div><span class="step-label">Payment</span></div>
            <div class="step-connector"></div>
            <div class="step" id="step-3"><div class="step-circle">3</div><span class="step-label">Review</span></div>
          </div>
          <div id="checkout-step-1">
            <div class="card" style="padding: 24px; margin-bottom: 16px;"><h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Contact Information</h3><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="c-email" placeholder="you@example.com" required></div></div>
            <div class="card" style="padding: 24px; margin-bottom: 16px;"><h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Shipping Address</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" id="c-fname" required></div>
                <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" id="c-lname" required></div>
              </div>
              <div class="form-group"><label class="form-label">Address</label><input type="text" class="form-input" id="c-address" required></div>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                <div class="form-group"><label class="form-label">City</label><input type="text" class="form-input" id="c-city" required></div>
                <div class="form-group"><label class="form-label">State</label><input type="text" class="form-input" id="c-state" required></div>
                <div class="form-group"><label class="form-label">ZIP</label><input type="text" class="form-input" id="c-zip" required></div>
              </div>
            </div>
            <button class="btn btn-primary w-full" style="justify-content: center;" onclick="goToStep(2)">Continue to Payment</button>
          </div>
          <div id="checkout-step-2" class="hidden">
            <div class="card" style="padding: 24px; margin-bottom: 16px;"><h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Payment Method</h3>
              <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
                <label style="display: flex; align-items: center; gap: 12px; padding: 16px; border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; background: var(--primary-light);"><input type="radio" name="payment" value="card" checked style="accent-color: var(--primary);"><span style="font-weight: 500;">Credit Card</span></label>
                <label style="display: flex; align-items: center; gap: 12px; padding: 16px; border: 1px solid var(--border-primary); border-radius: 10px; cursor: pointer;"><input type="radio" name="payment" value="paypal" style="accent-color: var(--primary);"><span style="font-weight: 500;">PayPal</span></label>
              </div>
              <div class="form-group"><label class="form-label">Card Number</label><input type="text" class="form-input" id="c-card" placeholder="4242 4242 4242 4242"></div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group"><label class="form-label">Expiry</label><input type="text" class="form-input" id="c-expiry" placeholder="MM/YY"></div>
                <div class="form-group"><label class="form-label">CVC</label><input type="text" class="form-input" id="c-cvc" placeholder="123"></div>
              </div>
            </div>
            <div style="display: flex; gap: 8px;"><button class="btn btn-ghost" style="flex: 1;" onclick="goToStep(1)">Back</button><button class="btn btn-primary" style="flex: 1; justify-content: center;" onclick="goToStep(3)">Review Order</button></div>
          </div>
          <div id="checkout-step-3" class="hidden">
            <div class="card" style="padding: 24px; margin-bottom: 16px;"><h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Order Summary</h3><div id="review-items"></div></div>
            <div style="display: flex; gap: 8px;"><button class="btn btn-ghost" style="flex: 1;" onclick="goToStep(2)">Back</button><button class="btn btn-success" style="flex: 1; justify-content: center;" onclick="placeOrder()">Place Order</button></div>
          </div>
        </div>
        <div id="order-summary-sidebar"></div>
      </div>
    </div>
  </section>
  <footer class="footer" id="footer"></footer>
  <script src="assets/js/app.js"></script>
  <script>
    UI.injectNavbar(); UI.injectFooter();
    const cart = Cart.getItems();
    const items = cart.items || [];
    if (!items.length) { window.location.href = 'cart.html'; }
    const subtotal = Cart.getTotal();
    const shipping = subtotal > 50 ? 0 : 5.99;
    const tax = subtotal * 0.08;
    const total = subtotal + shipping + tax;

    document.getElementById('order-summary-sidebar').innerHTML = `
      <div class="card" style="padding: 24px; position: sticky; top: 90px;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Order Summary</h3>
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
          ${items.map(i => `<div style="display: flex; gap: 10px;"><img src="${i.image}" style="width: 48px; height: 48px; border-radius: 8px; object-fit: cover;"><div style="flex: 1;"><div style="font-size: 13px; font-weight: 500;">${i.name}</div><div style="font-size: 12px; color: var(--text-muted);">Qty: ${i.qty}</div></div><div style="font-weight: 500; font-size: 13px;">$${(i.price * i.qty).toFixed(2)}</div></div>`).join('')}
        </div>
        <div class="divider" style="margin: 12px 0;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px;"><span style="color: var(--text-secondary);">Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px;"><span style="color: var(--text-secondary);">Shipping</span><span>${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span></div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px;"><span style="color: var(--text-secondary);">Tax</span><span>$${tax.toFixed(2)}</span></div>
        <div class="divider" style="margin: 12px 0;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: 700;"><span>Total</span><span>$${total.toFixed(2)}</span></div>
      </div>`;

    document.getElementById('review-items').innerHTML = items.map(i => `<div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-primary);"><span>${i.name} x${i.qty}</span><span style="font-weight: 500;">$${(i.price * i.qty).toFixed(2)}</span></div>`).join('') + `<div style="display: flex; justify-content: space-between; padding: 12px 0; font-size: 18px; font-weight: 700;"><span>Total</span><span>$${total.toFixed(2)}</span></div>`;

    function goToStep(n) {
      [1, 2, 3].forEach(i => { document.getElementById('checkout-step-' + i).classList.add('hidden'); document.getElementById('step-' + i).classList.remove('active', 'completed'); });
      document.getElementById('checkout-step-' + n).classList.remove('hidden');
      for (let i = 1; i < n; i++) document.getElementById('step-' + i).classList.add('completed');
      document.getElementById('step-' + n).classList.add('active');
    }

    function placeOrder() {
      const orderId = 'ord_' + Date.now();
      DB.create('orders', {
        store_id: 'store_1',
        order_number: 'ORD-' + (1000 + DB.getAll('orders').length + 1),
        customer: { name: document.getElementById('c-fname').value + ' ' + document.getElementById('c-lname').value, email: document.getElementById('c-email').value },
        items: items,
        subtotal: subtotal,
        shipping: shipping,
        tax: tax,
        total: total,
        status: 'pending',
        payment_status: 'paid',
        created_at: new Date().toISOString()
      });
      Cart.clear();
      Toast.show('Order placed successfully!', 'success');
      setTimeout(() => window.location.href = 'order-success.html?id=' + orderId, 1000);
    }
    goToStep(1);
  </script>
</body>
</html>
