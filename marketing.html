<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Marketing</h1><p class="dashboard-subtitle">Campaigns and promotions.</p></div><button class="btn btn-primary" onclick="Toast.show('Campaign creation coming soon', 'info')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Campaign</button></div></div>
      <div style="display: grid; gap: 20px;">
        <div class="campaign-card reveal">
          <div class="campaign-header"><div><h3 class="campaign-title">Holiday Sale 2024</h3><p class="campaign-meta">Email Campaign &middot; Active &middot; Started Dec 1</p></div><span class="badge badge-success">Active</span></div>
          <div class="campaign-stats"><div class="campaign-stat"><div class="campaign-stat-value">1,240</div><div class="campaign-stat-label">Sent</div></div><div class="campaign-stat"><div class="campaign-stat-value">682</div><div class="campaign-stat-label">Opened</div></div><div class="campaign-stat"><div class="campaign-stat-value">186</div><div class="campaign-stat-label">Clicked</div></div></div>
        </div>
        <div class="campaign-card reveal">
          <div class="campaign-header"><div><h3 class="campaign-title">New Year Campaign</h3><p class="campaign-meta">Social Media &middot; Scheduled &middot; Starts Jan 1</p></div><span class="badge badge-warning">Scheduled</span></div>
          <div class="campaign-stats"><div class="campaign-stat"><div class="campaign-stat-value">0</div><div class="campaign-stat-label">Sent</div></div><div class="campaign-stat"><div class="campaign-stat-value">0</div><div class="campaign-stat-label">Opened</div></div><div class="campaign-stat"><div class="campaign-stat-value">0</div><div class="campaign-stat-label">Clicked</div></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>Auth.requireAuth(); UI.injectSidebar('marketing'); UI.injectTopbar();</script>
</body>
</html>
