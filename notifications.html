<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Notifications</h1><p class="dashboard-subtitle">Your recent notifications and alerts.</p></div><button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button></div></div>
      <div style="display: flex; flex-direction: column; gap: 8px;" id="notifs-list"></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('notifications'); UI.injectTopbar();
    const session = Auth.getSession();
    function renderNotifs() {
      const notifs = DB.query('notifications', n => n.user_id === session.userId);
      const typeIcons = { order: 'var(--primary-light); color: var(--primary);', product: 'var(--warning-light); color: var(--warning-dark);', review: 'var(--success-light); color: var(--success-dark);', system: 'var(--info-light); color: var(--info-dark);' };
      document.getElementById('notifs-list').innerHTML = notifs.length ? notifs.map(n => `<div class="notification-item ${n.read ? '' : 'unread'} reveal" onclick="markRead('${n.id}')" style="cursor: pointer;"><div class="notification-icon" style="background: ${typeIcons[n.type] || typeIcons.system};"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></div><div class="notification-content"><div class="notification-title">${n.title}</div><div class="notification-text">${n.message}</div><div class="notification-time">${UI.timeAgo(n.created_at)}</div></div></div>`).join('') : '<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><h4 class="empty-title">No notifications</h4></div>';
    }
    function markRead(id) { DB.update('notifications', id, { read: true }); renderNotifs(); }
    function markAllRead() { DB.query('notifications', n => n.user_id === session.userId).forEach(n => DB.update('notifications', n.id, { read: true })); renderNotifs(); Toast.show('All notifications marked as read', 'success'); }
    renderNotifs();
  </script>
</body>
</html>
