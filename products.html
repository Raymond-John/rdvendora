<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Products</h1><p class="dashboard-subtitle">Manage your product catalog.</p></div><button class="btn btn-primary" onclick="openAddProduct()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Product</button></div></div>
      <div class="filters-bar reveal"><div class="filters-left"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="prod-search" placeholder="Search products..." oninput="filterProducts()"></div><select class="form-input" id="cat-filter" style="width: auto;" onchange="filterProducts()"><option value="">All Categories</option><option>electronics</option><option>fashion</option><option>accessories</option><option>home</option><option>beauty</option></select><select class="form-input" id="stock-filter" style="width: auto;" onchange="filterProducts()"><option value="">All Stock</option><option value="in">In Stock</option><option value="low">Low Stock</option><option value="out">Out of Stock</option></select></div></div>
      <div class="table-container reveal"><table class="data-table" id="products-table"><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Sales</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('products'); UI.injectTopbar();
    let allProducts = DB.getAll('products');
    const statusBadges = { active: 'badge-success', out_of_stock: 'badge-error', draft: 'badge-warning' };

    function renderProducts(products) {
      const tbody = document.querySelector('#products-table tbody');
      if (!products.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><h4 class="empty-title">No products found</h4></div></td></tr>'; return; }
      tbody.innerHTML = products.map(p => `<tr><td><div style="display: flex; align-items: center; gap: 12px;"><img src="${p.image}" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;" alt=""><div><div style="font-weight: 500;">${p.name}</div><div style="font-size: 12px; color: var(--text-muted);">${p.sku}</div></div></div></td><td><span class="badge badge-outline" style="text-transform: capitalize;">${p.category}</span></td><td style="font-weight: 600;">$${p.price.toFixed(2)}</td><td><span class="stock-indicator"><span class="stock-dot ${p.stock === 0 ? 'stock-out' : p.stock < 10 ? 'stock-low' : 'stock-in'}"></span>${p.stock}</span></td><td>${p.sales}</td><td><span class="badge ${statusBadges[p.status] || 'badge-outline'}">${p.status}</span></td><td><div style="display: flex; gap: 4px;"><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="editProduct('${p.id}')" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn btn-ghost btn-icon btn-icon-sm" style="color: var(--error);" onclick="deleteProduct('${p.id}')" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></td></tr>`).join('');
    }
    function filterProducts() {
      const q = document.getElementById('prod-search').value.toLowerCase();
      const c = document.getElementById('cat-filter').value;
      const s = document.getElementById('stock-filter').value;
      renderProducts(allProducts.filter(p => (!q || p.name.toLowerCase().includes(q)) && (!c || p.category === c) && (!s || (s === 'in' && p.stock > 10) || (s === 'low' && p.stock > 0 && p.stock <= 10) || (s === 'out' && p.stock === 0))));
    }
    function openAddProduct() {
      Modal.open(`<form onsubmit="saveProduct(event)"><div class="form-group"><label class="form-label">Product Name</label><input type="text" class="form-input" id="p-name" required></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div class="form-group"><label class="form-label">Price</label><input type="number" class="form-input" id="p-price" step="0.01" min="0" required></div><div class="form-group"><label class="form-label">Compare Price</label><input type="number" class="form-input" id="p-compare" step="0.01" min="0"></div></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div class="form-group"><label class="form-label">Category</label><select class="form-input" id="p-cat"><option>electronics</option><option>fashion</option><option>accessories</option><option>home</option><option>beauty</option></select></div><div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input" id="p-stock" min="0" required></div></div><div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="p-desc" rows="3"></textarea></div></form>`, { title: 'Add Product', width: '520px', footer: '<button class="btn btn-secondary" onclick="Modal.close(this.closest(\'.modal-overlay\'))">Cancel</button><button class="btn btn-primary" onclick="document.querySelector(\'.modal-overlay form\').dispatchEvent(new Event(\'submit\'))">Save Product</button>' });
    }
    function saveProduct(e) { e.preventDefault(); const name = document.getElementById('p-name').value; const price = parseFloat(document.getElementById('p-price').value); const category = document.getElementById('p-cat').value; const stock = parseInt(document.getElementById('p-stock').value); const desc = document.getElementById('p-desc').value; const newProd = DB.create('products', { store_id: 'store_1', name, price, compare_price: price * 1.3, category, stock, status: stock > 0 ? 'active' : 'out_of_stock', sku: 'SKU-' + Math.random().toString(36).substr(2, 6).toUpperCase(), sales: 0, views: 0, rating: 0, review_count: 0, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop', description: desc, tags: [] }); allProducts = DB.getAll('products'); renderProducts(allProducts); Toast.show('Product created!', 'success'); Modal.close(document.querySelector('.modal-overlay')); }
    function editProduct(id) { const p = DB.getById('products', id); if (!p) return; Toast.show('Edit: ' + p.name, 'info'); }
    function deleteProduct(id) { if (!confirm('Delete this product?')) return; DB.delete('products', id); allProducts = DB.getAll('products'); renderProducts(allProducts); Toast.show('Product deleted', 'success'); }
    renderProducts(allProducts);
  </script>
</body>
</html>
