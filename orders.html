<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Orders</h1><p class="dashboard-subtitle">Manage and track all your orders.</p></div></div></div>
      <div class="filters-bar reveal">
        <div class="filters-left">
          <div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="order-search" placeholder="Search orders..." oninput="filterOrders()"></div>
          <select class="form-input" id="status-filter" style="width: auto;" onchange="filterOrders()"><option value="">All Status</option><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select>
        </div>
        <div class="filters-right"><button class="btn btn-primary btn-sm" onclick="Toast.show('Export functionality coming soon', 'info')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button></div>
      </div>
      <div class="table-container reveal"><table class="data-table" id="orders-table"><thead><tr><th>Order</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
      <div style="display: flex; justify-content: center; margin-top: 24px;" id="pagination"></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('orders'); UI.injectTopbar();
    let allOrders = DB.getAll('orders');
    const statusColors = { pending: 'badge-warning', processing: 'badge-info', shipped: 'badge-primary', delivered: 'badge-success', cancelled: 'badge-error' };
    const payColors = { paid: 'badge-success', refunded: 'badge-error', pending: 'badge-warning' };

    function renderOrders(orders) {
      const tbody = document.querySelector('#orders-table tbody');
      if (!orders.length) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg></div><h4 class="empty-title">No orders found</h4><p class="empty-text">Try adjusting your search or filters.</p></div></td></tr>'; return; }
      tbody.innerHTML = orders.map(o => `<tr><td><span style="font-weight: 600; color: var(--primary);">${o.order_number}</span></td><td><div style="display: flex; align-items: center; gap: 8px;"><div class="avatar avatar-sm" style="background: var(--primary-light); color: var(--primary);">${o.customer.name.split(' ').map(n => n[0]).join('')}</div><span>${o.customer.name}</span></div></td><td style="color: var(--text-muted);">${new Date(o.created_at).toLocaleDateString()}</td><td>${o.items.length} item(s)</td><td style="font-weight: 600;">$${o.total.toFixed(2)}</td><td><span class="badge ${payColors[o.payment_status] || 'badge-outline'}">${o.payment_status}</span></td><td><span class="badge ${statusColors[o.status] || 'badge-outline'}">${o.status}</span></td><td><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="viewOrder('${o.id}')" title="View"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></td></tr>`).join('');
    }
    function filterOrders() {
      const q = document.getElementById('order-search').value.toLowerCase();
      const s = document.getElementById('status-filter').value;
      renderOrders(allOrders.filter(o => (!q || o.order_number.toLowerCase().includes(q) || o.customer.name.toLowerCase().includes(q)) && (!s || o.status === s)));
    }
    function viewOrder(id) { const o = DB.getById('orders', id); if (!o) return; Modal.open(`<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;"><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Order Number</div><div style="font-weight: 600;">${o.order_number}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Date</div><div>${new Date(o.created_at).toLocaleDateString()}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Customer</div><div>${o.customer.name}</div></div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Total</div><div style="font-weight: 600;">$${o.total.toFixed(2)}</div></div></div><div style="margin-bottom: 16px;"><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">Items</div>${o.items.map(i => `<div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-primary);"><span>${i.name} x${i.qty}</span><span style="font-weight: 500;">$${(i.price * i.qty).toFixed(2)}</span></div>`).join('')}</div><div><div style="font-size: 11px; color: var(--text-muted); margin-bottom: 2px;">Status</div><span class="badge ${statusColors[o.status]}">${o.status}</span></div>`, { title: 'Order Details', width: '480px' }); }
    renderOrders(allOrders);
  </script>
</body>
</html>
