<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Analytics</h1><p class="dashboard-subtitle">Deep insights into your store performance.</p></div><div class="tabs"><button class="tab-btn active">7 days</button><button class="tab-btn">30 days</button><button class="tab-btn">90 days</button></div></div></div>
      <div class="stats-grid"><div class="stat-card reveal"><div class="stat-header"><div class="stat-icon purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>12.5%</span></div><div class="stat-value">$45,230</div><div class="stat-label">Total Revenue</div></div><div class="stat-card reveal"><div class="stat-header"><div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg></div><span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>8.2%</span></div><div class="stat-value">186</div><div class="stat-label">Orders</div></div><div class="stat-card reveal"><div class="stat-header"><div class="stat-icon amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>24%</span></div><div class="stat-value">124</div><div class="stat-label">New Customers</div></div><div class="stat-card reveal"><div class="stat-header"><div class="stat-icon blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16.2 7.8l-2 6.3l-6.4 2.1l2-6.3z"/></svg></div><span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>5.3%</span></div><div class="stat-value">3.2%</div><div class="stat-label">Conversion Rate</div></div></div>
      <div class="dashboard-grid dashboard-grid-2"><div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">Revenue Over Time</h3></div><div class="chart-wrapper"><canvas id="revenueChart"></canvas></div></div><div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">Sales by Category</h3></div><div class="chart-wrapper chart-wrapper-sm"><canvas id="categoryChart"></canvas></div></div></div>
      <div class="dashboard-grid dashboard-grid-2"><div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">Customer Growth</h3></div><div class="chart-wrapper"><canvas id="customerChart"></canvas></div></div><div class="chart-container reveal"><div class="chart-header"><h3 class="chart-title">Top Traffic Sources</h3></div><div class="chart-wrapper chart-wrapper-sm"><canvas id="trafficChart"></canvas></div></div></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('analytics'); UI.injectTopbar();
    new Chart(document.getElementById('revenueChart').getContext('2d'), { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'Revenue', data: [3200,4100,3800,5200,4800,6100,4500], borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,0.08)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, pointHoverRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } }, y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 }, callback: v => '$' + v } } } } });
    new Chart(document.getElementById('categoryChart').getContext('2d'), { type: 'bar', data: { labels: ['Fashion','Home','Electronics','Beauty','Accessories'], datasets: [{ data: [12500,8900,7200,5400,4100], backgroundColor: ['#4f46e5','#10b981','#f59e0b','#ec4899','#8b5cf6'], borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } }, y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 }, callback: v => '$' + v/1000 + 'k' } } } } });
    new Chart(document.getElementById('customerChart').getContext('2d'), { type: 'line', data: { labels: ['Week 1','Week 2','Week 3','Week 4'], datasets: [{ label: 'New', data: [28,35,42,19], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }, { label: 'Returning', data: [15,22,18,25], borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,0.08)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 16, font: { size: 11 } } } }, scales: { x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } }, y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 } } } } } });
    new Chart(document.getElementById('trafficChart').getContext('2d'), { type: 'doughnut', data: { labels: ['Direct','Social','Organic','Email','Referral'], datasets: [{ data: [35,25,20,12,8], backgroundColor: ['#4f46e5','#10b981','#f59e0b','#ec4899','#8b5cf6'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 16, font: { size: 11 } } } } } });
  </script>
</body>
</html>
