<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header">
        <div class="dashboard-header-row">
          <div>
            <h1 class="dashboard-title">Dashboard</h1>
            <p class="dashboard-subtitle">Welcome back! Here's what's happening with your store.</p>
          </div>
          <div class="flex gap-2">
            <a href="products.html" class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Product</a>
          </div>
        </div>
      </div>

      <div class="stats-grid stagger-children">
        <div class="stat-card reveal">
          <div class="stat-header">
            <div class="stat-icon purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
            <span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>12.5%</span>
          </div>
          <div class="stat-value" data-counter="45230" data-prefix="$">$0</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card reveal">
          <div class="stat-header">
            <div class="stat-icon green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
            <span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>8.2%</span>
          </div>
          <div class="stat-value" data-counter="186">0</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card reveal">
          <div class="stat-header">
            <div class="stat-icon amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <span class="stat-trend up"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>24%</span>
          </div>
          <div class="stat-value" data-counter="124">0</div>
          <div class="stat-label">Customers</div>
        </div>
        <div class="stat-card reveal">
          <div class="stat-header">
            <div class="stat-icon blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
            <span class="stat-trend down"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>3</span>
          </div>
          <div class="stat-value" data-counter="23">0</div>
          <div class="stat-label">Products</div>
        </div>
      </div>

      <div class="dashboard-grid dashboard-grid-2">
        <div class="chart-container reveal">
          <div class="chart-header">
            <h3 class="chart-title">Revenue Overview</h3>
            <div class="tabs"><button class="tab-btn active">7 days</button><button class="tab-btn">30 days</button><button class="tab-btn">1 year</button></div>
          </div>
          <div class="chart-wrapper"><canvas id="revenueChart"></canvas></div>
        </div>
        <div class="chart-container reveal">
          <div class="chart-header">
            <h3 class="chart-title">Orders by Status</h3>
          </div>
          <div class="chart-wrapper chart-wrapper-sm"><canvas id="ordersChart"></canvas></div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="dashboard-card reveal">
          <div class="dashboard-card-header"><h3 class="dashboard-card-title">Recent Orders</h3><a href="orders.html" class="btn btn-ghost btn-sm">View all</a></div>
          <div class="dashboard-card-body">
            <div class="table-container"><table class="data-table" id="recent-orders-table"><thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead><tbody></tbody></table></div>
          </div>
        </div>
        <div class="dashboard-card reveal">
          <div class="dashboard-card-header"><h3 class="dashboard-card-title">Top Products</h3><a href="products.html" class="btn btn-ghost btn-sm">View all</a></div>
          <div class="dashboard-card-body" id="top-products"></div>
        </div>
        <div class="dashboard-card reveal">
          <div class="dashboard-card-header"><h3 class="dashboard-card-title">Recent Activity</h3></div>
          <div class="dashboard-card-body"><div class="activity-list" id="activity-feed"></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth();
    UI.injectSidebar('dashboard');
    UI.injectTopbar();

    // Counter animation
    document.querySelectorAll('[data-counter]').forEach(el => {
      const target = parseFloat(el.dataset.counter);
      const prefix = el.dataset.prefix || '';
      const duration = 1500;
      const startTime = performance.now();
      const update = (t) => {
        const p = Math.min((t - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = prefix + (target % 1 !== 0 ? (target * eased).toFixed(target < 10 ? 1 : 0) : Math.floor(target * eased).toLocaleString());
        if (p < 1) requestAnimationFrame(update);
      };
      requestAnimationFrame(update);
    });

    // Revenue chart
    const revCtx = document.getElementById('revenueChart').getContext('2d');
    new Chart(revCtx, {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'Revenue',
          data: [3200, 4100, 3800, 5200, 4800, 6100, 4500],
          borderColor: '#4f46e5',
          backgroundColor: 'rgba(79,70,229,0.08)',
          fill: true,
          tension: 0.4,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#8b95a5', font: { size: 11 } } },
          y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#8b95a5', font: { size: 11 }, callback: v => '$' + v } }
        },
        interaction: { intersect: false, mode: 'index' }
      }
    });

    // Orders chart
    const ordCtx = document.getElementById('ordersChart').getContext('2d');
    new Chart(ordCtx, {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'Processing', 'Shipped', 'Pending'],
        datasets: [{
          data: [45, 30, 15, 10],
          backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b95a5'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '70%',
        plugins: {
          legend: { position: 'bottom', labels: { usePointStyle: true, padding: 16, font: { size: 11 } } }
        }
      }
    });

    // Recent orders
    const orders = DB.getAll('orders').slice(0, 5);
    document.querySelector('#recent-orders-table tbody').innerHTML = orders.map(o => {
      const statusColors = { pending: 'badge-warning', processing: 'badge-info', shipped: 'badge-primary', delivered: 'badge-success', cancelled: 'badge-error' };
      return `<tr><td><span style="font-weight: 600;">${o.order_number}</span></td><td>${o.customer.name}</td><td>$${o.total.toFixed(2)}</td><td><span class="badge ${statusColors[o.status] || 'badge-outline'}">${o.status}</span></td></tr>`;
    }).join('');

    // Top products
    const products = DB.getAll('products').filter(p => p.store_id === 'store_1').sort((a, b) => b.sales - a.sales).slice(0, 5);
    document.getElementById('top-products').innerHTML = products.map((p, i) => `
      <div class="top-product-item"><div class="top-product-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
      <div class="top-product-image"><img src="${p.image}" alt="${p.name}"></div>
      <div class="top-product-info"><div class="top-product-name">${p.name}</div><div class="top-product-category">${p.category}</div></div>
      <div class="top-product-revenue">$${(p.sales * p.price).toFixed(0)}</div></div>
    `).join('');

    // Activity feed
    const activities = DB.getAll('activity_log').slice(0, 6);
    const actIcons = { 'Product created': 'purple', 'Order received': 'green', 'Product updated': 'amber', 'Customer registered': 'blue', 'Discount created': 'red' };
    document.getElementById('activity-feed').innerHTML = activities.map(a => {
      const color = actIcons[a.action] || 'purple';
      return `<div class="activity-item"><div class="activity-icon" style="background: var(--${color === 'purple' ? 'primary' : color}-light); color: var(--${color === 'purple' ? 'primary' : color + '-dark'});"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></div><div class="activity-content"><div class="activity-text"><strong>${a.action}</strong> - ${a.details}</div><div class="activity-time">${UI.timeAgo(a.created_at)}</div></div></div>`;
    }).join('');
  </script>
</body>
</html>
