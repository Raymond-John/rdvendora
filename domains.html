<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domains - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Domains</h1><p class="dashboard-subtitle">Manage your store domains.</p></div></div></div>
      <div style="display: flex; flex-direction: column; gap: 12px;" id="domains-list"></div>
      <div class="card reveal" style="padding: 24px; margin-top: 24px;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Add Custom Domain</h3>
        <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">Connect your own domain to your store.</p>
        <div style="display: flex; gap: 8px;"><input type="text" class="form-input" id="new-domain" placeholder="yourdomain.com"><button class="btn btn-primary" onclick="addDomain()">Add Domain</button></div>
      </div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('domains'); UI.injectTopbar();
    function renderDomains() {
      const domains = DB.getAll('domains');
      document.getElementById('domains-list').innerHTML = domains.map(d => `<div class="domain-card reveal"><div class="domain-info"><div class="domain-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg></div><div><div class="domain-name">${d.domain}</div><div class="domain-status">${d.type === 'subdomain' ? 'Subdomain' : 'Custom'} &middot; ${d.is_primary ? 'Primary' : 'Secondary'}</div></div></div><div style="display: flex; align-items: center; gap: 8px;"><span class="badge ${d.status === 'active' ? 'badge-success' : 'badge-warning'}">${d.status}</span>${!d.is_primary ? `<button class="btn btn-ghost btn-icon btn-icon-sm" onclick="deleteDomain('${d.id}')" title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>` : ''}</div></div>`).join('');
    }
    function addDomain() { const domain = document.getElementById('new-domain').value.trim(); if (!domain) return; DB.create('domains', { store_id: 'store_1', domain, type: 'custom', status: 'pending', is_primary: false }); document.getElementById('new-domain').value = ''; renderDomains(); Toast.show('Domain added. DNS verification pending.', 'success'); }
    function deleteDomain(id) { if (!confirm('Remove this domain?')) return; DB.delete('domains', id); renderDomains(); Toast.show('Domain removed', 'success'); }
    renderDomains();
  </script>
</body>
</html>
