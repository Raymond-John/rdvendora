<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div class="success-page">
    <div class="success-card anim-scale-in">
      <div class="success-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h1 class="success-title">Order Confirmed!</h1>
      <p class="success-text">Thank you for your purchase. We've sent a confirmation email with your order details.</p>
      <div class="success-details">
        <div class="success-detail-row"><span class="success-detail-label">Order Number</span><span class="success-detail-value" id="order-num">ORD-1016</span></div>
        <div class="success-detail-row"><span class="success-detail-label">Date</span><span class="success-detail-value" id="order-date">Dec 15, 2024</span></div>
        <div class="success-detail-row"><span class="success-detail-label">Total</span><span class="success-detail-value" id="order-total">$0.00</span></div>
        <div class="success-detail-row"><span class="success-detail-label">Payment</span><span class="success-detail-value">Credit Card</span></div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <a href="storefront.html" class="btn btn-primary w-full" style="justify-content: center;">Continue Shopping</a>
        <a href="index.html" class="btn btn-ghost w-full" style="justify-content: center;">Back to Home</a>
      </div>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById('order-date').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const lastOrder = DB.getAll('orders').slice(-1)[0];
    if (lastOrder) {
      document.getElementById('order-num').textContent = lastOrder.order_number;
      document.getElementById('order-total').textContent = '$' + lastOrder.total.toFixed(2);
    }
  </script>
</body>
</html>
