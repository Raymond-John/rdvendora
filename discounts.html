<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discounts - Vendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.remove('active')"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="dashboard-content page-enter">
      <div class="dashboard-header"><div class="dashboard-header-row"><div><h1 class="dashboard-title">Discounts</h1><p class="dashboard-subtitle">Manage coupons and promotions.</p></div><button class="btn btn-primary" onclick="openAddCoupon()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create Coupon</button></div></div>
      <div style="display: flex; flex-direction: column; gap: 16px;" id="coupons-list"></div>
    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    Auth.requireAuth(); UI.injectSidebar('discounts'); UI.injectTopbar();
    function renderCoupons() {
      const coupons = DB.getAll('coupons');
      document.getElementById('coupons-list').innerHTML = coupons.map(c => `<div class="coupon-card reveal"><div style="display: flex; align-items: center; gap: 16px; flex: 1;"><div class="coupon-code">${c.code}</div><div><div style="font-weight: 500;">${c.type === 'percentage' ? c.value + '% off' : '$' + c.value + ' off'} ${c.min_purchase > 0 ? '(min $' + c.min_purchase + ')' : ''}</div><div style="font-size: 12px; color: var(--text-muted);">Used ${c.usage_count} of ${c.usage_limit} times &middot; Expires ${c.expires_at}</div></div></div><div style="display: flex; align-items: center; gap: 8px;"><span class="badge ${c.status === 'active' ? 'badge-success' : 'badge-error'}">${c.status}</span><button class="btn btn-ghost btn-icon btn-icon-sm" onclick="deleteCoupon('${c.id}')" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div>`).join('');
    }
    function openAddCoupon() { Modal.open(`<form id="coupon-form" onsubmit="saveCoupon(event)"><div class="form-group"><label class="form-label">Code</label><input type="text" class="form-input" id="c-code" placeholder="WELCOME20" required></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div class="form-group"><label class="form-label">Type</label><select class="form-input" id="c-type"><option value="percentage">Percentage</option><option value="fixed">Fixed Amount</option></select></div><div class="form-group"><label class="form-label">Value</label><input type="number" class="form-input" id="c-value" required></div></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div class="form-group"><label class="form-label">Min Purchase</label><input type="number" class="form-input" id="c-min" value="0"></div><div class="form-group"><label class="form-label">Usage Limit</label><input type="number" class="form-input" id="c-limit" value="100"></div></div><div class="form-group"><label class="form-label">Expires</label><input type="date" class="form-input" id="c-expires" required></div></form>`, { title: 'Create Coupon', width: '480px', footer: '<button class="btn btn-secondary" onclick="Modal.close(document.querySelector(\'.modal-overlay\'))">Cancel</button><button class="btn btn-primary" onclick="document.getElementById(\'coupon-form\').dispatchEvent(new Event(\'submit\'))">Create</button>' }); }
    function saveCoupon(e) { e.preventDefault(); DB.create('coupons', { store_id: 'store_1', code: document.getElementById('c-code').value.toUpperCase(), type: document.getElementById('c-type').value, value: parseFloat(document.getElementById('c-value').value), min_purchase: parseFloat(document.getElementById('c-min').value), usage_limit: parseInt(document.getElementById('c-limit').value), usage_count: 0, expires_at: document.getElementById('c-expires').value, status: 'active' }); renderCoupons(); Toast.show('Coupon created!', 'success'); Modal.close(document.querySelector('.modal-overlay')); }
    function deleteCoupon(id) { if (!confirm('Delete this coupon?')) return; DB.delete('coupons', id); renderCoupons(); Toast.show('Coupon deleted', 'success'); }
    renderCoupons();
  </script>
</body>
</html>
